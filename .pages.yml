media:
  input: src/assets/images
  output: /assets/images

content:

  - name: artikel
    label: Artikel
    type: collection
    path: src/artikel
    view:
      fields: [title, typ, year, date]
    fields:

      # ── Pflichtfelder ──────────────────────────────────────────────────────
      - name: typ
        label: Typ
        type: select
        options:
          - { value: projekt, label: Projekt }
          - { value: blog,    label: Blogpost }

      - { name: title,       label: Titel,        type: string }
      - { name: description, label: Beschreibung, type: string, required: false }

      # ── Nur für Projekte ───────────────────────────────────────────────────
      - { name: year,   label: Jahr,   type: number, required: false }
      - { name: client, label: Kunde,  type: string, required: false }
      - { name: role,   label: Rolle,  type: string, required: false }
      - { name: cover,  label: Cover,  type: image,  required: false }

      - name: tags
        label: Tags
        type: string
        list: true
        required: false

      # ── Nur für Blogposts ─────────────────────────────────────────────────
      - { name: date, label: Datum, type: date, required: false }

      # ── Inhalt ────────────────────────────────────────────────────────────
      # Nutze [xf:...]-Shortcodes für Blöcke:
      #
      #   [xf:video url="https://www.youtube-nocookie.com/embed/ID"]
      #   [xf:slider bilder="ordner/bild1.webp, ordner/bild2.webp"]
      #   [xf:bild src="ordner/bild.webp" alt="Beschreibung"]
      #   [xf:bild-duo links="ordner/a.webp" rechts="ordner/b.webp"]
      #   [xf:callout text="Kernaussage oder Zitat"]
      #
      - { name: body, label: Inhalt, type: rich-text }
