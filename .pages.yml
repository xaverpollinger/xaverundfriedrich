media:
  input: src/assets/images
  output: /assets/images

content:

  - name: blog
    label: Blog
    type: collection
    path: src/blog
    view:
      fields: [title, date]
    fields:
      - { name: title,       label: Titel,         type: string }
      - { name: description, label: Beschreibung,  type: string }
      - { name: date,        label: Datum,         type: date }
      - name: tags
        label: Tags
        type: multiselect
        required: false
        options:
          - Design
          - UX
          - Code
          - Meta
          - Typografie
      - { name: body, label: Inhalt, type: rich-text }

  - name: projekte
    label: Projekte
    type: collection
    path: src/projekte
    view:
      fields: [title, year, client]
    fields:
      - { name: title,       label: Titel,         type: string }
      - { name: description, label: Beschreibung,  type: string }
      - { name: year,        label: Jahr,          type: number }
      - { name: client,      label: Kunde,         type: string,  required: false }
      - { name: role,        label: Rolle,         type: string,  required: false }
      - name: tags
        label: Tags
        type: string
        list: true
        required: false
      - { name: cover,        label: Cover-Bild,   type: image,  required: false }

      - { name: ausgangslage, label: Ausgangslage, type: text,   required: false }
      - { name: prozess,      label: Prozess,      type: text,   required: false }
      - { name: ergebnis,     label: Ergebnis,     type: text,   required: false }

      - name: bilder
        label: Bildslider
        type: object
        list: true
        required: false
        fields:
          - { name: src, label: Bild,     type: image }
          - { name: alt, label: Alt-Text, type: string, required: false }

      - { name: body, label: Inhalt, type: rich-text, required: false }
