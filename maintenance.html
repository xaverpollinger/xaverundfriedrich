<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xaver Friedrich — Bald zurück</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: ui-monospace, "Cascadia Code", "Courier New", monospace;
      background: #ffffff;
      color: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }

    .wrap {
      max-width: 480px;
      width: 100%;
    }

    .logo {
      margin-bottom: 3rem;
      opacity: 0.4;
    }

    .logo svg {
      height: 20px;
      width: auto;
    }

    h1 {
      font-size: clamp(1.375rem, 1.067rem + 1.315vw, 2.25rem);
      font-weight: 500;
      font-style: italic;
      line-height: 1.3;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 0.875rem;
      font-weight: 300;
      font-style: italic;
      color: #6b6b6b;
      line-height: 1.6;
    }

    a {
      color: #0d0d0d;
      transition: opacity 150ms ease;
    }

    a:hover { opacity: 0.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg viewBox="0 0 80 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" height="20">
        <text x="0" y="18" font-family="monospace" font-size="16" font-style="italic">x&amp;f</text>
      </svg>
    </div>
    <h1>Gleich zurück —<br>die Seite wird gerade überarbeitet.</h1>
    <p>In Kürze ist alles fertig. Bei dringenden Anfragen: <a href="mailto:info@xaverfriedrich.de">info@xaverfriedrich.de</a></p>
  </div>
</body>
</html>
