[build]
  command   = "npm run build"
  publish   = "_site"

[build.environment]
  NODE_VERSION = "20"

# --- Security Headers (alle Seiten) ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "DENY"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=()"

# --- Langzeit-Caching für Fonts (unveränderlich) ---
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Langzeit-Caching für Bilder ---
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
