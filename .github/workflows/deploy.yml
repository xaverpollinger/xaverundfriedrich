name: Build & Deploy to Strato

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Seite bauen
        run: npm run build

      - name: lftp installieren
        run: sudo apt-get install -y lftp

      - name: Auf Strato deployen (SFTP)
        env:
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","$SFTP_PASS" \
               -e "set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 3; mirror --reverse --delete --no-perms ./_site/ ${{ secrets.FTP_SERVER_DIR }}; quit" \
               sftp://${{ secrets.FTP_SERVER }}
